name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'flutter_app_folder/**'
      - '.github/workflows/flutter-web.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: flutter_app_folder
        run: flutter pub get

      - name: Build Web
        working-directory: flutter_app_folder
        # The base-href MUST match your repository name exactly!
        run: flutter build web --base-href "/music_separator_project/" --release

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: flutter_app_folder/build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
